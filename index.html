<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday, Pikachu!🌸❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background: #000000;
            color: #ffffff;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .space-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #111125 0%, #000000 100%);
            z-index: 1;
        }
        .stars {
            position: absolute;
            width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.4;
            animation: moveStars 30s linear infinite;
        }

        .app-container {
            position: relative;
            width: 100%;
            max-width: 420px;
            height: 100vh;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* LAYER 1: QR WELCOME */
        #layer-welcome {
            position: absolute;
            width: 90%;
            max-width: 340px;
            background: #11112a;
            border-radius: 24px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 15px 45px rgba(255, 20, 147, 0.2);
            border: 1px solid rgba(255, 20, 147, 0.3);
            transition: all 0.8s ease;
            z-index: 100;
        }
        .ribbon-qr-box {
            position: relative;
            width: 180px;
            height: 180px;
            background: #ffffff;
            margin: 0 auto 25px;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .ribbon-qr-box::before {
            content: "💝";
            position: absolute;
            top: -20px;
            font-size: 40px;
        }
        .qr-mock-pattern {
            width: 140px;
            height: 140px;
            background: radial-gradient(circle, #ff1493 60%, transparent 65%);
            background-size: 10px 10px;
            mask-image: url('https://upload.wikimedia.org/wikipedia/commons/4/41/Left_heart_twemoji.svg');
            -webkit-mask-image: url('https://upload.wikimedia.org/wikipedia/commons/4/41/Left_heart_twemoji.svg');
            mask-size: contain;
            -webkit-mask-size: contain;
            mask-repeat: no-repeat;
            -webkit-mask-repeat: no-repeat;
            mask-position: center;
            -webkit-mask-position: center;
        }
        .btn-buka {
            background: linear-gradient(45deg, #ff1493, #ff69b4);
            color: #fff;
            border: none;
            padding: 12px 35px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(255, 20, 147, 0.4);
        }

        /* LAYER 2: COUNTDOWN */
        #layer-countdown {
            position: absolute;
            width: 100%; height: 100%;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 90;
        }
        .matrix-lines {
            position: absolute;
            width: 100%; height: 100%;
            background: linear-gradient(180deg, rgba(255, 20, 147, 0.1) 0%, transparent 100%);
            background-size: 20px 100%;
            opacity: 0.7;
        }
        .cd-number {
            font-size: 120px;
            font-weight: 900;
            color: #ff1493;
            text-shadow: 0 0 30px #ff1493;
            animation: scalePulse 1s infinite ease-in-out;
        }
        .typing-word {
            font-size: 50px;
            font-weight: 800;
            color: #ff1493;
            text-shadow: 0 0 25px rgba(255, 20, 147, 0.8);
            display: none;
            text-align: center;
        }

        /* LAYER 3: MAIN SLIDESHOW */
        #layer-main {
            position: absolute;
            width: 100%; height: 100%;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 80;
        }
        .slide-page {
            width: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.8s ease forwards;
        }
        .slide-page.active { display: flex; }

        /* FLIP LETTER CARD */
        .letter-card {
            width: 100%;
            height: 180px;
            perspective: 1000px;
            margin-bottom: 25px;
            cursor: pointer;
        }
        .card-inner {
            position: relative;
            width: 100%; height: 100%;
            text-align: center;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }
        .card-inner.is-flipped { transform: rotateY(180deg); }
        .card-front, .card-back {
            position: absolute;
            width: 100%; height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            border-radius: 20px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        .card-front { background: #ffffff; color: #222; }
        .card-back {
            background: #ffffff; color: #222;
            transform: rotateY(180deg);
            font-family: 'Caveat', cursive;
            font-size: 22px;
            line-height: 1.4;
        }

        /* GRID DUA FOTO (SLIDE 1 & 2) */
        .split-photos-box {
            display: flex;
            gap: 15px;
            width: 100%;
            justify-content: center;
        }
        .split-frame {
            width: 145px;
            height: 190px;
            background: #222;
            border-radius: 16px;
            overflow: hidden;
            border: 4px solid #ffffff;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            transform: translateY(30px);
            opacity: 0;
            animation: slideUpIn 0.8s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards;
        }
        .split-frame img { width: 100%; height: 100%; object-fit: cover; }
        .split-frame:nth-child(2) { animation-delay: 0.2s; }

        /* VINYL PLAYER AUDIO INFO */
        .vinyl-player {
            position: absolute;
            top: 40px; left: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.08);
            padding: 6px 14px 6px 6px;
            border-radius: 30px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .vinyl-disk {
            width: 36px; height: 36px;
            background: radial-gradient(circle, #111 30%, #333 40%, #111 50%, #444 60%, #111 70%);
            border-radius: 50%;
            animation: spin 4s linear infinite;
            animation-play-state: paused;
        }
        .vinyl-text {
            font-size: 11px;
            font-weight: 600;
            color: rgba(255,255,255,0.8);
            max-width: 110px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .nav-circle-btn {
            position: absolute;
            bottom: 40px; right: 20px;
            width: 50px; height: 50px;
            background: #ffffff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            border: none;
        }
        .nav-circle-btn::after { content: "➔"; color: #ff1493; font-size: 20px; font-weight: bold; }

        /* LAYER AKHIR: ALBUM 8 FOTO BENTUK HATI SEMPURNA */
        .heart-cloud-container {
            position: relative;
            width: 100%;
            height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .cloud-photo {
            position: absolute;
            width: 65px; height: 65px;
            object-fit: cover;
            border-radius: 8px;
            border: 2px solid #ffffff;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            transition: all 1.5s cubic-bezier(0.25, 1, 0.5, 1);
            transform: translate(0, 0) scale(0.1);
            opacity: 0;
        }

        /* Koordinat baru yang presisi menyusun 8 FOTO menjadi bentuk hati penuh */
        .heart-cloud-container.assemble .p-1 { transform: translate(-35px, -75px) scale(1); opacity: 1; z-index: 10; }
        .heart-cloud-container.assemble .p-2 { transform: translate(35px, -75px) scale(1); opacity: 1; z-index: 10; }
        .heart-cloud-container.assemble .p-3 { transform: translate(-85px, -35px) scale(1); opacity: 1; z-index: 9; }
        .heart-cloud-container.assemble .p-4 { transform: translate(85px, -35px) scale(1); opacity: 1; z-index: 9; }
        .heart-cloud-container.assemble .p-5 { transform: translate(-75px, 20px) scale(1); opacity: 1; z-index: 8; }
